name: build-api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "apps/api/Dockerfile"
      - ".github/workflows/build-api.yml"
  workflow_dispatch:

concurrency:
  group: build-api-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/forcetower/ledger-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pin the built sha tag into the deploy repo so the redeploy picks it up; the
      # commit doubles as a deploy log. Via the GraphQL createCommitOnBranch API so
      # the commit is signed by GitHub (Verified) and authored by the token owner.
      - name: Pin image tag in deploy repo
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_DEPLOY_PAT }}
          TAGS: ${{ steps.meta.outputs.tags }}
          REPO: ForceTower/homelab-pi
          BRANCH: main
          FILE: services/ledger/docker-compose.yml
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMELAB_DEPLOY_PAT not set; skipping image-tag pin."
            exit 0
          fi
          tag=$(printf '%s\n' "$TAGS" | grep -oE 'sha-[0-9a-f]+' | head -1)
          if [ -z "$tag" ]; then echo "::error::metadata produced no sha- tag"; exit 1; fi
          old=$(gh api "repos/${REPO}/contents/${FILE}?ref=${BRANCH}" --jq .content | base64 -d)
          new=$(printf '%s' "$old" | sed "s|${IMAGE}:[^[:space:]]*|${IMAGE}:${tag}|g")
          if [ "$old" = "$new" ]; then
            echo "deploy compose already at ${tag}; nothing to commit."
            exit 0
          fi
          oid=$(gh api "repos/${REPO}/commits/${BRANCH}" --jq .sha)
          gh api graphql -f query='mutation($repo:String!,$branch:String!,$oid:GitObjectID!,$path:String!,$contents:Base64String!,$msg:String!){createCommitOnBranch(input:{branch:{repositoryNameWithOwner:$repo,branchName:$branch},message:{headline:$msg},expectedHeadOid:$oid,fileChanges:{additions:[{path:$path,contents:$contents}]}}){commit{oid}}}' \
            -f repo="$REPO" -f branch="$BRANCH" -f oid="$oid" -f path="$FILE" \
            -f contents="$(printf '%s\n' "$new" | base64 -w0)" -f msg="deploy(ledger): ${tag}" >/dev/null
          echo "Pinned ledger to ${tag} (Verified, via createCommitOnBranch)."

      # Trigger the deploy webhook, retrying transient failures. No-op if unset.
      - name: Trigger redeploy webhook
        if: github.ref == 'refs/heads/main'
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PORTAINER_WEBHOOK_URL not set; skipping redeploy trigger."
            exit 0
          fi
          # Retry transient failures; fail fast on a 3xx (rejected token, not a
          # transient error). curl -f alone would treat a 3xx as success.
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$WEBHOOK" \
              -H "CF-Access-Client-Id: $CF_ID" \
              -H "CF-Access-Client-Secret: $CF_SECRET" || echo 000)
            echo "Attempt ${attempt}: webhook HTTP ${code}"
            case "$code" in
              2*) echo "Redeploy triggered."; exit 0 ;;
              30*) echo "::error::Redirect (${code}) - deploy token rejected by the gateway."; exit 1 ;;
              *)  echo "transient (${code}); retrying in 15s..."; sleep 15 ;;
            esac
          done
          echo "::error::webhook failed after 5 attempts."; exit 1
