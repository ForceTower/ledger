name: build-api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "apps/api/Dockerfile"
      - ".github/workflows/build-api.yml"
  workflow_dispatch:

concurrency:
  group: build-api-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/forcetower/ledger-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pin the freshly-built sha tag into the homelab-pi compose and push it.
      # This advances homelab-pi's HEAD, so the Portainer webhook below actually
      # redeploys: Portainer's git-stack webhook no-ops when the tracked repo's
      # commit is unchanged, and an image-only build never moves it otherwise.
      # The commit doubles as a deploy log (rollback = git revert). No-ops if the
      # deploy token is unset.
      - name: Pin image tag in homelab-pi
        if: github.ref == 'refs/heads/main'
        env:
          HOMELAB_PAT: ${{ secrets.HOMELAB_DEPLOY_PAT }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          if [ -z "$HOMELAB_PAT" ]; then
            echo "HOMELAB_DEPLOY_PAT not set; skipping image-tag pin."
            exit 0
          fi
          tag=$(printf '%s\n' "$TAGS" | grep -oE 'sha-[0-9a-f]+' | head -1)
          if [ -z "$tag" ]; then echo "::error::metadata produced no sha- tag"; exit 1; fi
          git clone --depth 1 "https://x-access-token:${HOMELAB_PAT}@github.com/ForceTower/homelab-pi.git" hp
          sed -i "s|${IMAGE}:[^[:space:]]*|${IMAGE}:${tag}|g" hp/services/ledger/docker-compose.yml
          cd hp
          git config user.name "ledger-ci"
          git config user.email "ci@users.noreply.github.com"
          if git diff --quiet; then
            echo "homelab-pi compose already at ${tag}; nothing to commit."
          else
            git commit -am "deploy(ledger): ${tag}"
            git push
            echo "Pinned ledger to ${tag}."
          fi

      # Tell Portainer to re-pull the image and redeploy the stack, which re-runs
      # the one-shot `migrate` service. The webhook URL comes from the ledger stack
      # in Portainer (Stack -> Webhooks); Portainer sits behind Cloudflare Access, so
      # we authenticate with a service token. Store all three as repo secrets. No-ops
      # if the webhook secret is unset.
      - name: Trigger Portainer redeploy
        if: github.ref == 'refs/heads/main'
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PORTAINER_WEBHOOK_URL not set; skipping redeploy trigger."
            exit 0
          fi
          # Do NOT use `curl -f` alone: it treats a 302 (Cloudflare Access login
          # redirect, i.e. a rejected service token) as success. Capture the code
          # and fail on anything that is not 2xx.
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$WEBHOOK" \
            -H "CF-Access-Client-Id: $CF_ID" \
            -H "CF-Access-Client-Secret: $CF_SECRET")
          echo "Portainer webhook responded HTTP $code"
          case "$code" in
            2*) echo "Redeploy triggered." ;;
            30*) echo "::error::Redirect ($code) - Cloudflare Access rejected the service token. Ensure the Access app covering the webhook path has a Service Auth policy that includes this token."; exit 1 ;;
            *)  echo "::error::Webhook failed (HTTP $code)."; exit 1 ;;
          esac
